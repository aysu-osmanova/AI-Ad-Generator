<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Ad Generator</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>AI Ad Generator</h1>

      <div class="panel-grid">
        <section class="panel left">
          <form id="genForm" class="form-panel">
            <label>Business Name
              <input id="business" name="business_name" required />
            </label>

            <label>Product / Service
              <input id="product" name="product_service" required />
            </label>

            <label>Mode
              <select id="mode" name="mode">
                <option value="express">Express</option>
                <option value="agency">Agency</option>
              </select>
            </label>

            <button id="generate">Generate</button>
          </form>
        </section>

        <section class="panel right">
          <div id="results" class="results-panel" aria-live="polite">
            <div id="placeholder" class="placeholder">
              Ready to create something amazing? Fill out the form to see your ads here!
            </div>

            <div class="card" id="instagramCard">
              <div class="card-header"><h2>Instagram</h2><button class="copy-btn" data-target="instagram" title="Copy Instagram">📋</button></div>
              <div id="instagram" class="result-content"></div>
            </div>

            <div class="card" id="facebookCard">
              <div class="card-header"><h2>Facebook</h2><button class="copy-btn" data-target="facebook" title="Copy Facebook">📋</button></div>
              <div id="facebook" class="result-content"></div>
            </div>

            <div class="card" id="tiktokCard">
              <div class="card-header"><h2>TikTok</h2><button class="copy-btn" data-target="tiktok" title="Copy TikTok">📋</button></div>
              <div id="tiktok" class="result-content"></div>
            </div>
          </div>
        </section>
      </div>

      <script src="/app.js"></script>
    </main>
  </body>
</html>
